      - key: TRADE_EXECUTOR_SYMBOLS
        value: BTC,SOL
      - key: TRADE_SIGNAL_CONFIRMATIONS
        value: "1"
      - key: TRADE_EXECUTION_GRACE_MINUTES
        value: "59"
      - key: TRADE_HOLD_HOURS
